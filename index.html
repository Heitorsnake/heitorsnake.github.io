<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Artistas do rock</title>
<style>body {
    background-color: #ffffff;
    color: #000000;
    margin: 0;
    min-height: 100vh;
}
h1 {
     font-variant: small-caps;
     font-size: 5rem;
     color: rgb(0, 0, 0);
     text-align: center;
     margin: 40px 0 20px 0;
     font-weight: 800;
     letter-spacing: 2px;
     text-transform: uppercase;
     text-shadow: 0 8px 18px rgba(202, 39, 39, 0.25), 0 4px 10px rgba(0, 0, 0, 0.75);
}
.meu-botao {
    font: 200;
    background-color: #ffffff;
    color: rgb(0, 0, 0);            
    border: none;          
    padding: 12px 24px;     
    font-size: 16px;          
    border-radius: 8px;      
    cursor: pointer;          
    transition: background-color 0.3s;
}
    
.meu-botao :hover {
    background-color: rgb(129, 47, 47);
}
.artistas {
    display: flex;
    justify-content: center;
    gap: 48px;
    margin: 30px auto 60px auto;
    max-width: 1100px;
}
.artistas img {
    width: 300px;
    height: auto;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    transition: transform .2s ease, box-shadow .2s ease;
}
.artistas img:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.6);
}
.artistas a {
    display: inline-block;
    text-decoration: none;
}
.artistas a img {
    display: block;
}
</style>
    <link rel="stylesheet" href="style.css">
</head>
