<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - WaterSave</title>
    <link rel="stylesheet" href="registrar.css">
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <h1>Entre em Contato</h1>
            <p>Transforme o acesso à água na sua região.</p>
            
            <form>
                <input type="text" placeholder="Nome completo" required>
                <input type="email" placeholder="E-mail" required>
                <input type="tel" placeholder="Telefone / WhatsApp" required>
                <textarea placeholder="Fale sobre seu interesse (prefeitura, ONG, empresa...)" rows="5"></textarea>
                
                <button type="submit" class="btn-whatsapp">
                    <i class="fab fa-whatsapp"></i> Falar no WhatsApp
                </button>
            </form>
        </div>
    </div>
</body>
</html>
